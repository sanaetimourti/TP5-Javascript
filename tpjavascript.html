<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP JavaScript - Exercices 1 à 4</title>
    <style>
        /* STYLES (Ex 1 & 2)*/
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #fafafa;
        }
        h2 {
            color: #333;
        }
        input, button {
            margin: 5px;
            padding: 8px;
            font-size: 1em;
        }
        .exercice {
            margin-bottom: 40px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 20px;
        }

        /* STYLES EXERCICE 3 : Calculateur IMC */
        .imc-container {
            border: 1px solid #ccc;
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .imc-form-group {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-imc {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-imc:hover {
            background-color: #0056b3;
        }

        /* STYLES EXERCICE 4 : Calculatrice Avancée */
        .calc-container {
            width: 420px; 
            background-color: #ffffff;
            padding: 15px;
            border: 1px solid #ccc;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #ecran-calc {
            width: 100%;
            box-sizing: border-box;
            height: 45px;
            font-size: 1.5em;
            text-align: right;
            margin-bottom: 10px;
            padding: 5px 10px;
            border: 1px solid #bbb;
            background-color: #e9e9e9;
            outline: none;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px; 
        }
        .calc-grid button {
            width: 100%;
            padding: 12px 0;
            font-size: 1.1em;
            cursor: pointer;
            border: 1px solid #aaa;
            background-color: #a6a6a6;
            color: black;
            box-sizing: border-box;
        }
        .calc-grid button:hover {
            background-color: #888;
        }
        .calc-grid button.chiffre {
            background-color: #ffffff;
        }
        .calc-grid button.chiffre:hover {
            background-color: #e0e0e0;
        }
        .spacer {
            grid-column: span 3;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div class="exercice">
        <h2>Exercice 1 : Permutation</h2>
        <input type="text" id="zone1" placeholder="Texte 1">
        <input type="text" id="zone2" placeholder="Texte 2">
        <button onclick="permuter()">Permuter</button>
    </div>

    <div class="exercice">
        <h2>Exercice 2 : Calculatrice Simple</h2>
        <input type="number" id="nb1" placeholder="Nombre 1">
        <input type="number" id="nb2" placeholder="Nombre 2">
        <br>
        <button onclick="calculer('+')">+</button>
        <button onclick="calculer('-')">-</button>
        <button onclick="calculer('*')">*</button>
        <button onclick="calculer('/')">/</button>
        <br>
        <input type="text" id="resultat" placeholder="Résultat" readonly>
    </div>

    <div class="exercice">
        <h2>Exercice 3 : Calculateur d'IMC</h2>
        <div class="imc-container">
            <div class="imc-form-group">
                <label>Poids (kg):</label>
                <input type="number" id="poids" value="76">
            </div>
            <div class="imc-form-group">
                <label>Taille (m):</label>
                <input type="number" step="0.01" id="taille" value="1.45">
            </div>
            <button class="btn-imc" onclick="calculerIMC()">Calculer</button>
            <p id="message"></p>
        </div>
    </div>

    <div class="exercice" style="border-bottom: none;">
        <h2>Exercice 4 : Calculatrice Avancée</h2>
        <div class="calc-container">
            <input type="text" id="ecran-calc" readonly>
            <div class="calc-grid">
                <div class="spacer"></div>
                <button onclick="ajouter('(', '(')">(</button>
                <button onclick="ajouter(')', ')')">)</button>
                <button onclick="ajouter('%', '/100')">%</button>
                <button onclick="effacerTout()">CE</button>

                <button onclick="ajouter('Inv', '')">Inv</button>
                <button onclick="ajouter('sin(', 'Math.sin(')">sin</button>
                <button onclick="ajouter('ln(', 'Math.log(')">ln</button>
                <button class="chiffre" onclick="ajouter('7', '7')">7</button>
                <button class="chiffre" onclick="ajouter('8', '8')">8</button>
                <button class="chiffre" onclick="ajouter('9', '9')">9</button>
                <button onclick="ajouter('÷', '/')">÷</button>

                <button onclick="ajouter('π', 'Math.PI')">π</button>
                <button onclick="ajouter('cos(', 'Math.cos(')">cos</button>
                <button onclick="ajouter('log(', 'Math.log10(')">log</button>
                <button class="chiffre" onclick="ajouter('4', '4')">4</button>
                <button class="chiffre" onclick="ajouter('5', '5')">5</button>
                <button class="chiffre" onclick="ajouter('6', '6')">6</button>
                <button onclick="ajouter('x', '*')">x</button>

                <button onclick="ajouter('e', 'Math.E')">e</button>
                <button onclick="ajouter('tan(', 'Math.tan(')">tan</button>
                <button onclick="ajouter('√(', 'Math.sqrt(')">√</button>
                <button class="chiffre" onclick="ajouter('3', '3')">3</button>
                <button class="chiffre" onclick="ajouter('2', '2')">2</button>
                <button class="chiffre" onclick="ajouter('1', '1')">1</button>
                <button onclick="ajouter('-', '-')">-</button>

                <button onclick="ajouter('exp(', 'Math.exp(')">EXP</button>
                <button onclick="ajouter('²', '**2')">x²</button>
                <button onclick="ajouter('^', '**')">x^</button>
                <button class="chiffre" onclick="ajouter('.', '.')">.</button>
                <button class="chiffre" onclick="ajouter('0', '0')">0</button>
                <button onclick="calculerResultat()">=</button>
                <button onclick="ajouter('+', '+')">+</button>
            </div>
        </div>
    </div>

    <script>
        // EXE 1 : Permutation
        function permuter() {
            let input1 = document.getElementById('zone1');
            let input2 = document.getElementById('zone2');
            let temp = input1.value;
            input1.value = input2.value;
            input2.value = temp;
        }

        // EXE2 : Calculatrice Simple

        function calculer(operation) {
            let nb1 = parseFloat(document.getElementById('nb1').value);
            let nb2 = parseFloat(document.getElementById('nb2').value);
            let resInput = document.getElementById('resultat');

            if (isNaN(nb1) || isNaN(nb2)) {
                resInput.value = "Erreur: Nombres requis";
                return;
            }

            switch(operation) {
                case '+': resInput.value = nb1 + nb2; break;
                case '-': resInput.value = nb1 - nb2; break;
                case '*': resInput.value = nb1 * nb2; break;
                case '/': resInput.value = (nb2 !== 0) ? nb1 / nb2 : "Div par 0 !"; break;
            }
        }
        // EXE 3 : Calculateur IMC
        function calculerIMC() {
            let poids = parseFloat(document.getElementById('poids').value);
            let taille = parseFloat(document.getElementById('taille').value);
            let messageDiv = document.getElementById('message');

            if (poids > 0 && taille > 0) {
                let imc = poids / (taille * taille);
                let interpretation = "";

                if (imc < 18.5) interpretation = "Insuffisance pondérale (maigreur)";
                else if (imc < 25) interpretation = "Corpulence normale";
                else if (imc < 30) interpretation = "Surpoids";
                else if (imc < 35) interpretation = "Obésité modérée";
                else if (imc < 40) interpretation = "Obésité sévère";
                else interpretation = "Obésité morbide ou massive"; 

                messageDiv.innerHTML = `Votre IMC est de <strong>${imc.toFixed(2)}</strong>. Vous êtes en état d'<strong>${interpretation.toLowerCase()}</strong>.`;
            } else {
                messageDiv.innerHTML = "<span style='color:red;'>Veuillez entrer des valeurs valides.</span>";
            }
        }
        // EXE 4 : Calculatrice Avancée
        let affichage = "";
        let evaluation = "";
        let ecran = document.getElementById('ecran-calc');

        function ajouter(symboleVisuel, symboleJS) {
            affichage += symboleVisuel;
            evaluation += symboleJS;
            ecran.value = affichage;
        }

        function effacerTout() {
            affichage = "";
            evaluation = "";
            ecran.value = "";
        }

        function calculerResultat() {
            try {
                let resultat = eval(evaluation);
                if (resultat === undefined) {
                    ecran.value = "";
                    return;
                }
                resultat = Math.round(resultat * 100000000) / 100000000;
                
                ecran.value = resultat;
                affichage = resultat.toString();
                evaluation = resultat.toString();
            } catch (erreur) {
                ecran.value = "Erreur de syntaxe";
                affichage = "";
                evaluation = "";
            }
        }
    </script>

</body>
</html>
